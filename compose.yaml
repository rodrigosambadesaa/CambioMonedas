services:
  progvoraz-console:
    build:
      context: .
      dockerfile: Dockerfile
    image: progvoraz:latest
    volumes:
      - ./monedas.txt:/app/monedas.txt:ro
      - ./stock.txt:/app/stock.txt
      - ./historial.txt:/app/historial.txt
    stdin_open: true
    tty: true
    command: [ "console" ]

  progvoraz-gui-portable:
    build:
      context: .
      dockerfile: Dockerfile
    image: progvoraz:latest
    volumes:
      - ./monedas.txt:/app/monedas.txt:ro
      - ./stock.txt:/app/stock.txt
      - ./historial.txt:/app/historial.txt
    stdin_open: true
    tty: true
    command: [ "gui" ]

  progvoraz-test:
    build:
      context: .
      dockerfile: Dockerfile
    image: progvoraz:latest
    volumes:
      - ./monedas.txt:/app/monedas.txt:ro
      - ./stock.txt:/app/stock.txt
      - ./historial.txt:/app/historial.txt
    command: [ "test" ]

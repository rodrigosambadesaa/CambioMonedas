name: C CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: gcc -std=c11 -Wall -Wextra -Wpedantic -O2 main.c moneda_gestion.c bigint.c -o progvoraz

      - name: Build GUI (Linux portable)
        if: runner.os == 'Linux'
        run: gcc -std=c11 -Wall -Wextra -Wpedantic -O2 gui_portable.c moneda_gestion.c bigint.c -o progvoraz_gui

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: gcc -std=c11 -Wall -Wextra -Wpedantic -O2 main.c moneda_gestion.c bigint.c -o progvoraz

      - name: Swift toolchain info (macOS)
        if: runner.os == 'macOS'
        run: |
          xcode-select -p
          xcrun swift --version

      - name: Build GUI (macOS Swift)
        if: runner.os == 'macOS'
        run: xcrun --sdk macosx swiftc -parse-as-library gui_macos.swift -o progvoraz_gui

      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        run: |
          printf "a\neuro\n0\nsalir\n" | ./progvoraz

      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        run: |
          printf "a\neuro\n0\nsalir\n" | ./progvoraz

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: gcc -std=c11 -Wall -Wextra -Wpedantic -O2 main.c moneda_gestion.c bigint.c -o progvoraz.exe

      - name: Build GUI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: gcc -std=c11 -Wall -Wextra -Wpedantic -O2 gui_window.c moneda_gestion.c bigint.c -o progvoraz_gui.exe -mwindows

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          @"
          a
          euro
          0
          salir
          "@ | .\progvoraz.exe | Out-String

